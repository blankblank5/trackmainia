<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PolyTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#1a1a2e;font-family:'Nunito',sans-serif}
canvas{display:block}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20}
#start-screen{background:linear-gradient(160deg,#0f3460 0%,#16213e 50%,#0f3460 100%)}
#start-screen h1{font-size:clamp(52px,9vw,96px);font-weight:900;letter-spacing:6px;color:#fff;
  text-shadow:0 0 40px rgba(255,200,0,.6),0 4px 0 rgba(0,0,0,.4)}
#start-screen h1 span{color:#ffd700}
.tagline{font-size:13px;letter-spacing:5px;color:rgba(255,255,255,.45);text-transform:uppercase}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:6px 32px;margin-top:4px;padding:16px 24px;
  background:rgba(255,255,255,.06);border-radius:14px;border:1px solid rgba(255,255,255,.1)}
.ctrl-row{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.65)}
kbd{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-bottom:3px solid rgba(255,255,255,.1);
  border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800;font-family:inherit;color:#fff;min-width:32px;text-align:center}
.btn{border:none;border-radius:14px;padding:15px 50px;font-size:18px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:transform .12s,box-shadow .12s;font-family:inherit}
#start-btn{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a0800;
  box-shadow:0 6px 30px rgba(255,180,0,.5)}
#start-btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 10px 40px rgba(255,180,0,.7)}
#finish-screen{background:rgba(5,10,30,.95);display:none}
#finish-screen h2{font-size:clamp(44px,7vw,80px);font-weight:900;color:#ffd700;
  text-shadow:0 0 30px rgba(255,215,0,.5)}
.finish-cards{display:flex;gap:20px}
.fcard{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:16px 28px;text-align:center;min-width:140px}
.fcard-label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:4px}
.fcard-val{font-size:34px;font-weight:900;font-variant-numeric:tabular-nums}
.fcard-val.gold{color:#ffd700;text-shadow:0 0 15px #ffd70088}
.fcard-val.green{color:#00ff88;text-shadow:0 0 15px #00ff8888}
.fcard-val.white{color:#fff}
#restart-btn{background:linear-gradient(135deg,#00c8ff,#0070ff);color:#fff;
  box-shadow:0 6px 30px rgba(0,150,255,.4);margin-top:8px}
#restart-btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 10px 40px rgba(0,150,255,.6)}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#speed-box{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:8px 24px 10px;backdrop-filter:blur(10px)}
#speed-num{font-size:52px;font-weight:900;color:#fff;line-height:1;font-variant-numeric:tabular-nums;
  text-shadow:0 0 20px rgba(255,255,255,.3)}
#speed-unit{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:-2px}

#lap-box{position:absolute;bottom:24px;left:24px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);border-radius:14px;
  padding:8px 18px;backdrop-filter:blur(10px)}
#lap-time{font-size:28px;font-weight:800;color:#ffd700;font-variant-numeric:tabular-nums;text-shadow:0 0 12px #ffd70066}
#best-time{font-size:13px;font-weight:700;color:rgba(255,255,255,.4);font-variant-numeric:tabular-nums;margin-top:1px}

#lap-counter{position:absolute;top:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;align-items:center;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:8px 18px;backdrop-filter:blur(10px)}
.lap-dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .3s}
.lap-dot.done{background:#00ff88;border-color:#00ff88;box-shadow:0 0 10px #00ff88}
.lap-dot.active{background:#ffd700;border-color:#ffd700;box-shadow:0 0 12px #ffd700;transform:scale(1.3)}
#lap-label{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-left:4px}

#minimap-canvas{position:absolute;top:20px;right:20px;border-radius:12px;
  border:1px solid rgba(255,255,255,.15);box-shadow:0 4px 20px rgba(0,0,0,.4)}

#gear-box{position:absolute;bottom:24px;right:24px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);border-radius:14px;
  padding:8px 20px;backdrop-filter:blur(10px);text-align:center}
#gear-num{font-size:42px;font-weight:900;color:rgba(255,255,255,.25);line-height:1;transition:color .1s,text-shadow .1s}
#gear-num.red{color:#ff4400;text-shadow:0 0 20px #ff440099}
#gear-label{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.25);text-transform:uppercase}

#boost-bar{position:absolute;bottom:24px;right:100px;
  display:flex;flex-direction:column-reverse;gap:3px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:8px 6px}
.bseg{width:20px;height:9px;border-radius:3px;background:rgba(255,255,255,.06);transition:all .1s}
.bseg.lit{background:#ff8800;box-shadow:0 0 8px #ff880099}
.bseg.lit.top{background:#ff2200;box-shadow:0 0 10px #ff220099}

#wrongway{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:48px;font-weight:900;color:#ff2200;letter-spacing:4px;
  text-shadow:0 0 30px #ff220099;display:none;animation:blink .5s infinite alternate}
@keyframes blink{to{opacity:.2}}

#cp-flash{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .05s;
  box-shadow:inset 0 0 80px rgba(0,255,136,.5)}
#cp-flash.show{opacity:1;animation:cpf .5s ease-out forwards}
@keyframes cpf{0%{opacity:1}100%{opacity:0}}

#countdown-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:140px;font-weight:900;color:#fff;display:none;pointer-events:none;
  text-shadow:0 0 60px rgba(255,255,255,.6)}
</style>
</head>
<body>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <h1>POLY<span>TRACK</span></h1>
  <div class="tagline">Low Poly Racing &middot; 3 Laps</div>
  <div class="controls">
    <div class="ctrl-row"><kbd>W</kbd> Accelerate</div>
    <div class="ctrl-row"><kbd>S</kbd> Brake / Reverse</div>
    <div class="ctrl-row"><kbd>A</kbd><kbd>D</kbd> Steer</div>
    <div class="ctrl-row"><kbd>Space</kbd> Handbrake</div>

  </div>
  <button class="btn" id="start-btn">START RACE</button>
</div>

<!-- FINISH SCREEN -->
<div class="screen" id="finish-screen">
  <h2>FINISH!</h2>
  <div class="finish-cards">
    <div class="fcard"><div class="fcard-label">Your Time</div><div class="fcard-val gold" id="f-time">-</div></div>
    <div class="fcard"><div class="fcard-label">Best Lap</div><div class="fcard-val green" id="f-best">-</div></div>
    <div class="fcard"><div class="fcard-label">Top Speed</div><div class="fcard-val white" id="f-spd">-</div></div>
  </div>
  <button class="btn" id="restart-btn">RACE AGAIN</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="countdown-box"></div>
  <div id="cp-flash"></div>
  <div id="wrongway">WRONG WAY</div>

  <div id="lap-counter">
    <div class="lap-dot" id="ld0"></div>
    <div class="lap-dot" id="ld1"></div>
    <div class="lap-dot" id="ld2"></div>
    <span id="lap-label">LAP 1 / 3</span>
  </div>

  <canvas id="minimap-canvas" width="140" height="140"></canvas>

  <div id="lap-box">
    <div id="lap-time">0:00.000</div>
    <div id="best-time">BEST: --:--.---</div>
  </div>

  <div id="speed-box">
    <div id="speed-num">0</div>
    <div id="speed-unit">km / h</div>
  </div>

  <div id="gear-box">
    <div id="gear-num">1</div>
    <div id="gear-label">GEAR</div>
  </div>

  <div id="boost-bar">
    <div class="bseg" id="bs4"></div>
    <div class="bseg" id="bs3"></div>
    <div class="bseg" id="bs2"></div>
    <div class="bseg" id="bs1"></div>
    <div class="bseg" id="bs0"></div>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
const $  = id => document.getElementById(id);
const PI = Math.PI;
const fmt = ms => {
  if (!isFinite(ms) || ms < 0) return '--:--.---';
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const x = Math.floor(ms%1000);
  return `${m}:${String(s).padStart(2,'0')}.${String(x).padStart(3,'0')}`;
};

// ─────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
// No tone mapping so colors stay vivid
renderer.toneMapping = THREE.NoToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);
window.addEventListener('resize', () => {
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─────────────────────────────────────────────
//  SCENE + CAMERA
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); // bright sky blue like PolyTrack
scene.fog = new THREE.Fog(0x87ceeb, 200, 600);

const cam = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);

// ─────────────────────────────────────────────
//  LIGHTING  – flat/low-poly look needs bright diffuse
// ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const sun = new THREE.DirectionalLight(0xfff5e0, 3.5);
sun.position.set(80, 160, 60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 500;
sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
sun.shadow.camera.right= sun.shadow.camera.top   =  200;
sun.shadow.bias = -0.002;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xaaddff, 1.2);
fill.position.set(-60, 40, -80);
scene.add(fill);

// ─────────────────────────────────────────────
//  FLAT MATERIAL HELPER (no shininess, PolyTrack look)
// ─────────────────────────────────────────────
const mat = (hex, opts={}) => new THREE.MeshLambertMaterial({ color: hex, ...opts });

// ─────────────────────────────────────────────
//  GROUND  – big bright green plane
// ─────────────────────────────────────────────
const groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(1000, 1000),
  mat(0x5bc65f)  // vivid grass green
);
groundMesh.rotation.x = -PI/2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// Low-poly terrain bumps
const terrGeo = new THREE.PlaneGeometry(1000, 1000, 30, 30);
const terrPos = terrGeo.attributes.position;
for (let i = 0; i < terrPos.count; i++) {
  const x = terrPos.getX(i), z = terrPos.getZ(i);
  const d = Math.sqrt(x*x + z*z);
  if (d > 90) terrPos.setZ(i, Math.sin(x*0.04)*Math.cos(z*0.04)*6 + Math.random()*2);
}
terrGeo.computeVertexNormals();
const terrMesh = new THREE.Mesh(terrGeo, mat(0x4aaf4e));
terrMesh.rotation.x = -PI/2;
terrMesh.position.y = -0.05;
terrMesh.receiveShadow = true;
scene.add(terrMesh);

// ─────────────────────────────────────────────
//  DECORATIVE TREES
// ─────────────────────────────────────────────
function makeTree(x, z) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,3,5), mat(0x8B5E3C));
  trunk.position.y = 1.5; trunk.castShadow = true; g.add(trunk);
  const top = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 6), mat(0x2d8a30));
  top.position.y = 6; top.castShadow = true; g.add(top);
  const top2 = new THREE.Mesh(new THREE.ConeGeometry(1.8, 3.5, 6), mat(0x3aa63d));
  top2.position.y = 8.5; g.add(top2);
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * PI;
  scene.add(g);
}
[[40,-40],[60,-80],[80,-50],[30,-130],[90,-110],[110,-70],
 [-40,-50],[-60,-90],[-80,-130],[-50,-170],[-100,-100],[-120,-50],
 [-110,20],[-90,60],[-50,90],[-20,110],[20,90],[50,60],
 [120,-150],[140,-90],[160,-40],[80,30],[100,70],
 [180,-120],[200,-60],[-150,-80],[-160,-20]
].forEach(([x,z]) => makeTree(x, z));

// Colorful balloons/decorations on stands
function makeFlag(x, z, color) {
  const g = new THREE.Group();
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,8,4), mat(0xdddddd));
  pole.position.y = 4; g.add(pole);
  const flag = new THREE.Mesh(new THREE.BoxGeometry(2,1.5,0.1), mat(color));
  flag.position.set(1.1,8,0); g.add(flag);
  g.position.set(x, 0, z); scene.add(g);
}

// ─────────────────────────────────────────────
//  TRACK DEFINITION  (flat tile-based like PolyTrack)
// ─────────────────────────────────────────────
// Waypoints in world space
const WAYPOINTS = [
  // Start/finish straight
  new THREE.Vector3(  0, 0.5,  20),
  new THREE.Vector3( 30, 0.5,  20),
  new THREE.Vector3( 55, 0.5,   5),
  // Right-hand sweeper
  new THREE.Vector3( 75, 0.5, -30),
  new THREE.Vector3( 85, 0.5, -70),
  new THREE.Vector3( 78, 0.5,-115),
  // Hairpin left
  new THREE.Vector3( 45, 0.5,-155),
  new THREE.Vector3(  5, 0.5,-168),
  new THREE.Vector3(-30, 0.5,-165),
  // Gentle ramp up — spread Y rise over many XZ steps so slope is shallow
  new THREE.Vector3(-55, 1.5,-148),
  new THREE.Vector3(-72, 3.0,-128),
  new THREE.Vector3(-84, 5.0,-105),
  new THREE.Vector3(-90, 7.0, -80),
  new THREE.Vector3(-92, 8.5, -55),
  new THREE.Vector3(-88, 9.5, -30),
  // Elevated plateau + wide sweeper
  new THREE.Vector3(-80,10.0,  -5),
  new THREE.Vector3(-65,10.0,  20),
  new THREE.Vector3(-45,10.0,  40),
  // Ramp down — gradual
  new THREE.Vector3(-25, 7.5,  55),
  new THREE.Vector3( -5, 5.0,  65),
  new THREE.Vector3( 15, 2.5,  68),
  new THREE.Vector3( 28, 0.5,  58),
  // Return to start
  new THREE.Vector3( 20, 0.5,  40),
  new THREE.Vector3(  8, 0.5,  30),
  new THREE.Vector3(  0, 0.5,  20),
];

const TRACK_W    = 12;
const NUM_DIVS   = 200;
const trackCurve = new THREE.CatmullRomCurve3(WAYPOINTS, true, 'catmullrom', 0.5);
const trackPts   = trackCurve.getPoints(NUM_DIVS);
const trackFrames= trackCurve.computeFrenetFrames(NUM_DIVS, true);

// Build track surface using ExtrudeGeometry
function buildTrack() {
  // Main road surface
  const shape = new THREE.Shape();
  shape.moveTo(-TRACK_W/2, 0);
  shape.lineTo( TRACK_W/2, 0);
  shape.lineTo( TRACK_W/2, 0.6);
  shape.lineTo(-TRACK_W/2, 0.6);
  shape.lineTo(-TRACK_W/2, 0);

  const roadMesh = new THREE.Mesh(
    new THREE.ExtrudeGeometry(shape, { steps: NUM_DIVS, bevelEnabled: false, extrudePath: trackCurve }),
    mat(0xf0f0f0)  // bright white-grey road like PolyTrack
  );
  roadMesh.receiveShadow = true;
  scene.add(roadMesh);

  // Colorful kerb strips (left = red/white, right = yellow/white)
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < NUM_DIVS; i++) {
      const t  = i / NUM_DIVS;
      const tN = (i+1) / NUM_DIVS;
      const p  = trackCurve.getPointAt(t);
      const pN = trackCurve.getPointAt(tN);
      const bn = trackFrames.binormals[Math.min(i, trackFrames.binormals.length-1)];
      const n  = trackFrames.normals  [Math.min(i, trackFrames.normals.length-1)];
      const tan= new THREE.Vector3().subVectors(pN, p).normalize();
      const len= p.distanceTo(pN);

      const kp = p.clone()
        .addScaledVector(bn,  side * (TRACK_W/2 + 0.6))
        .addScaledVector(n, 0.3);

      const even = (Math.floor(i/4) % 2 === 0);
      const col  = even ? 0xff2222 : 0xffffff;
      const km   = new THREE.Mesh(
        new THREE.BoxGeometry(1.1, 0.5, len * 1.05),
        mat(col)
      );
      km.position.copy(kp);
      km.lookAt(kp.clone().add(tan));
      scene.add(km);
    }
  }

  // Road markings (white dashes)
  for (let i = 0; i < 60; i++) {
    const t   = i / 60;
    const t2  = (i + 0.35) / 60;
    const p1  = trackCurve.getPointAt(t);
    const p2  = trackCurve.getPointAt(t2);
    const mid = p1.clone().lerp(p2, 0.5);
    const tan = trackCurve.getTangentAt(t);
    const n   = trackFrames.normals[Math.min(Math.floor(t * NUM_DIVS), trackFrames.normals.length-1)];
    const m   = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.05, p1.distanceTo(p2) * 0.9),
      mat(0xffffff)
    );
    m.position.copy(mid).addScaledVector(n, 0.62);
    m.lookAt(mid.clone().add(tan));
    scene.add(m);
  }
}
buildTrack();

// Flags at start/finish
makeFlag(-6, 20, 0xff2222);
makeFlag( 6, 20, 0x22aaff);

// Boost pads
const BOOST_TS = [0.1, 0.3, 0.55, 0.75];
const boostMeshes = [];
BOOST_TS.forEach(t => {
  const p   = trackCurve.getPointAt(t);
  const idx = Math.floor(t * NUM_DIVS);
  const n   = trackFrames.normals  [Math.min(idx, trackFrames.normals.length-1)];
  const tan = trackFrames.tangents [Math.min(idx, trackFrames.tangents.length-1)];
  const m   = new THREE.Mesh(
    new THREE.BoxGeometry(TRACK_W * 0.7, 0.18, 4),
    new THREE.MeshLambertMaterial({ color: 0xff8800, emissive: 0xff4400, emissiveIntensity: 0.6 })
  );
  m.position.copy(p).addScaledVector(n, 0.62);
  m.lookAt(m.position.clone().add(tan));
  scene.add(m);
  // Arrow chevrons
  for (let a = -1; a <= 1; a++) {
    const arr = new THREE.Mesh(
      new THREE.ConeGeometry(0.9, 2.2, 3),
      new THREE.MeshLambertMaterial({ color: 0xffee00, emissive: 0xffaa00, emissiveIntensity: 0.8 })
    );
    arr.position.copy(p).addScaledVector(n, 1.2).addScaledVector(tan, a * 1.8);
    arr.lookAt(arr.position.clone().add(tan));
    arr.rotateX(-PI/2);
    scene.add(arr);
  }
  boostMeshes.push({ t });
});

// Checkpoints
const CP_TS = [0.0, 0.2, 0.4, 0.6, 0.8];
const cpData = [];
CP_TS.forEach((t, ci) => {
  const p   = trackCurve.getPointAt(t);
  const idx = Math.floor(t * NUM_DIVS);
  const n   = trackFrames.normals  [Math.min(idx, trackFrames.normals.length-1)];
  const bn  = trackFrames.binormals[Math.min(idx, trackFrames.binormals.length-1)];
  const tan = trackFrames.tangents [Math.min(idx, trackFrames.tangents.length-1)];
  const col = ci === 0 ? 0xffdd00 : 0x00ccff;

  // Gate posts
  [-1, 1].forEach(s => {
    const pp = p.clone()
      .addScaledVector(bn, s * (TRACK_W/2 + 0.4))
      .addScaledVector(n, 0.6);
    const post = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.35, 12, 6),
      new THREE.MeshLambertMaterial({ color: col, emissive: col, emissiveIntensity: 0.4 })
    );
    post.position.copy(pp).addScaledVector(n, 6);
    scene.add(post);
  });

  // Top beam
  const beam = new THREE.Mesh(
    new THREE.BoxGeometry(TRACK_W + 3, 0.6, 0.6),
    new THREE.MeshLambertMaterial({ color: col, emissive: col, emissiveIntensity: 0.4 })
  );
  beam.position.copy(p).addScaledVector(n, 0.6 + 12);
  beam.lookAt(beam.position.clone().add(tan));
  scene.add(beam);

  // Hanging banner
  if (ci === 0) {
    const banner = new THREE.Mesh(
      new THREE.BoxGeometry(TRACK_W + 1, 3, 0.08),
      new THREE.MeshLambertMaterial({ color: 0xff2222, emissive: 0xaa0000, emissiveIntensity: 0.3 })
    );
    banner.position.copy(p).addScaledVector(n, 0.6 + 10);
    banner.lookAt(banner.position.clone().add(tan));
    scene.add(banner);
  }

  cpData.push({ p: p.clone(), n: n.clone(), t, idx: ci });
});

// Grandstands
function makeStand(x, z, angle) {
  const g = new THREE.Group();
  const base = new THREE.Mesh(new THREE.BoxGeometry(20, 1, 8), mat(0xcccccc));
  base.position.y = 0.5; g.add(base);
  for (let row = 0; row < 4; row++) {
    const rowM = new THREE.Mesh(new THREE.BoxGeometry(20, 1, 1), mat(row % 2 === 0 ? 0xff4444 : 0x4488ff));
    rowM.position.set(0, row * 1.5 + 1.5, row * 1.5 - 2);
    g.add(rowM);
  }
  g.position.set(x, 0, z);
  g.rotation.y = angle;
  scene.add(g);
}

//  CAR  – PolyTrack chunky low-poly style
// ─────────────────────────────────────────────
function buildCar() {
  const g = new THREE.Group();
  const BODY_COL = 0xff3300;  // vivid red

  // Main body – chunky box
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.75, 4.2),
    mat(BODY_COL)
  );
  body.position.y = 0.5;
  body.castShadow = true;
  g.add(body);

  // Cabin top – trapezoid-ish with two boxes
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(1.9, 0.6, 1.8),
    mat(0xcc2200)
  );
  roof.position.set(0, 1.08, -0.2);
  roof.castShadow = true;
  g.add(roof);

  // Front nose slope
  const nose = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 0.35, 0.9),
    mat(0xff4411)
  );
  nose.position.set(0, 0.3, 1.9);
  nose.rotation.x = 0.35;
  g.add(nose);

  // Spoiler
  const spoilerBase = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.08, 0.8), mat(0x222222));
  spoilerBase.position.set(0, 1.35, -2.0);
  g.add(spoilerBase);
  [-0.8, 0.8].forEach(x => {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.1), mat(0x333333));
    p.position.set(x, 1.1, -2.0);
    g.add(p);
  });

  // Side skirts
  [-1.1, 1.1].forEach(x => {
    const skirt = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.3, 3.8), mat(0x222222));
    skirt.position.set(x, 0.2, 0);
    g.add(skirt);
  });

  // Windows (flat planes, slightly emissive)
  const winMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, emissive: 0x224466, emissiveIntensity: 0.5, transparent: true, opacity: 0.7 });
  const windshield = new THREE.Mesh(new THREE.PlaneGeometry(1.7, 0.6), winMat);
  windshield.position.set(0, 1.05, 0.72);
  windshield.rotation.x = 0.4;
  g.add(windshield);
  const rearWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.65, 0.5), winMat);
  rearWindow.position.set(0, 1.05, -1.1);
  rearWindow.rotation.x = -0.3;
  rearWindow.rotation.y = PI;
  g.add(rearWindow);

  // Wheels – thick cylinders, PolyTrack style
  const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.45, 8);
  const wheelMat = mat(0x222222);
  const hubGeo   = new THREE.CylinderGeometry(0.26, 0.26, 0.48, 6);
  const hubMat   = mat(0xeeeeee);
  const wheelPos = [
    { x: -1.2, y: 0.5, z:  1.55 },
    { x:  1.2, y: 0.5, z:  1.55 },
    { x: -1.2, y: 0.5, z: -1.55 },
    { x:  1.2, y: 0.5, z: -1.55 },
  ];
  const wheels = [];
  wheelPos.forEach((wp, wi) => {
    const wg = new THREE.Group();
    const wm = new THREE.Mesh(wheelGeo, wheelMat);
    wm.rotation.z = PI/2; wm.castShadow = true; wg.add(wm);
    const hm = new THREE.Mesh(hubGeo, hubMat);
    hm.rotation.z = PI/2; wg.add(hm);
    wg.position.set(wp.x, wp.y, wp.z);
    g.add(wg);
    wheels.push({ mesh: wg, front: wi < 2 });
  });

  // Headlights
  const hlMat = new THREE.MeshLambertMaterial({ color: 0xffffaa, emissive: 0xffff88, emissiveIntensity: 2 });
  [-0.7, 0.7].forEach(x => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.25, 0.08), hlMat);
    hl.position.set(x, 0.55, 2.12);
    g.add(hl);
  });

  // Taillights
  const tlMat = new THREE.MeshLambertMaterial({ color: 0xff1111, emissive: 0xff0000, emissiveIntensity: 1.5 });
  [-0.7, 0.7].forEach(x => {
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.2, 0.08), tlMat);
    tl.position.set(x, 0.55, -2.12);
    g.add(tl);
  });

  // Under-glow point light
  const ugl = new THREE.PointLight(0xff3300, 2, 5);
  ugl.position.set(0, 0.1, 0);
  g.add(ugl);

  g.castShadow = true;
  scene.add(g);
  return { group: g, wheels, ugl };
}
const CAR = buildCar();

// ─────────────────────────────────────────────
//  PARTICLE SYSTEM

class Sparks {
  constructor(n = 500) {
    this.n = n; this.pool = [];
    const geo = new THREE.BufferGeometry();
    this.pos = new Float32Array(n * 3);
    this.col = new Float32Array(n * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(this.col, 3));
    const mat = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending });
    this.mesh = new THREE.Points(geo, mat);
    scene.add(this.mesh);
  }
  spawn(p, v, r, g, b, life) {
    if (this.pool.length < this.n) this.pool.push({ x:p.x,y:p.y,z:p.z, vx:v.x,vy:v.y,vz:v.z, r,g,b, life, ml:life });
  }
  tick(dt) {
    for (let i = this.pool.length-1; i >= 0; i--) {
      const p = this.pool[i];
      p.life -= dt;
      if (p.life <= 0) { this.pool.splice(i,1); continue; }
      p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
      p.vy -= 4*dt;
    }
    for (let i = 0; i < this.n; i++) {
      if (i < this.pool.length) {
        const p = this.pool[i], t = p.life/p.ml;
        this.pos[i*3]=p.x; this.pos[i*3+1]=p.y; this.pos[i*3+2]=p.z;
        this.col[i*3]=p.r*t; this.col[i*3+1]=p.g*t; this.col[i*3+2]=p.b*t;
      } else {
        this.pos[i*3+1] = -9999;
      }
    }
    this.mesh.geometry.attributes.position.needsUpdate = true;
    this.mesh.geometry.attributes.color.needsUpdate    = true;
  }
}
const sparks = new Sparks();

function respawn() {
  const t = state.trackT;

  const idx = Math.floor(t * NUM_DIVS);
  const n   = trackFrames.normals  [Math.min(idx, trackFrames.normals.length-1)];

// ─────────────────────────────────────────────
//  PHYSICS
// ─────────────────────────────────────────────
const MAX_V   = 33.3;  // 120 km/h
const BOOST_V = 44.4;  // 160 km/h with nitro
const ACCEL   = 16;
const BRAKE   = 28;
const FRIC    = 0.974;
const STEER   = 1.9;
const LAT_F   = 0.80;

function tickPhysics(dt) {
  if (phase !== 'racing') return;

  const fwd = new THREE.Vector3(Math.sin(state.rot), 0, Math.cos(state.rot));
  const rgt = new THREE.Vector3(Math.cos(state.rot), 0, -Math.sin(state.rot));

  const W = keys['KeyW'] || keys['ArrowUp'];
  const S = keys['KeyS'] || keys['ArrowDown'];
  const A = keys['KeyA'] || keys['ArrowLeft'];
  const D = keys['KeyD'] || keys['ArrowRight'];
  const HB= keys['Space'];
  const N = keys['ShiftLeft'] || keys['ShiftRight'];
  if (keys['KeyR']) respawn();

  // Nitro
  if (N && boost > 0) { state.nitro = true;  boost = Math.max(0, boost - dt * 2); }
  else               { state.nitro = false; if (!N && boost < 5) boost = Math.min(5, boost + dt * 0.5); }

  const topV   = state.nitro ? BOOST_V : MAX_V;
  const fwdSpd = state.vel.dot(fwd);

  if (W && fwdSpd < topV)  state.vel.addScaledVector(fwd,  ACCEL * dt * (state.nitro ? 2.5 : 1));
  if (S) {
    if (fwdSpd > 0.5)      state.vel.addScaledVector(fwd, -BRAKE * dt);
    else                   state.vel.addScaledVector(fwd, -ACCEL * 0.5 * dt);
  }

  const steerF = Math.min(1, Math.abs(fwdSpd) / 9) * (fwdSpd < 0 ? -1 : 1);
  if (A) state.angVel += STEER * dt * steerF;
  if (D) state.angVel -= STEER * dt * steerF;
  if (!A && !D) state.angVel *= 0.65;
  state.angVel = Math.max(-3, Math.min(3, state.angVel));
  state.rot   += state.angVel * dt;

  const latSpd = state.vel.dot(rgt);
  state.vel.addScaledVector(rgt, -latSpd * (HB ? 0.25 : LAT_F));
  state.vel.multiplyScalar(FRIC);

  // ── Track snap ────────────────────────────
  // Search full 3D distance so ramps work correctly
  let minD = Infinity, bestT = state.trackT;
  for (let di = -30; di <= 30; di++) {
    let t = (state.trackT * NUM_DIVS + di) % NUM_DIVS;
    if (t < 0) t += NUM_DIVS;
    t /= NUM_DIVS;
    const p = trackCurve.getPointAt(Math.max(0, Math.min(0.9999, t)));
    const d = state.pos.distanceTo(p);
    if (d < minD) { minD = d; bestT = t; }
  }
  state.trackT = bestT;

  const tidx = Math.floor(bestT * NUM_DIVS);
  const ttan = trackFrames.tangents[Math.min(tidx, trackFrames.tangents.length-1)];
  const tpt  = trackCurve.getPointAt(Math.max(0, Math.min(0.9999, bestT)));

  // Target Y: track spine Y + track thickness + car ride height
  const targetY = tpt.y + 0.6 + 0.5;
  if (state.pos.y <= targetY + 0.05) {
    state.pos.y = targetY;
    if (state.vel.y < 0) state.vel.y = 0;
    state.onGround = true;
    // Bleed off vertical speed on ramps by projecting velocity onto track tangent plane
    const up = new THREE.Vector3(0, 1, 0);
    const slopeY = ttan.y;
    if (Math.abs(slopeY) > 0.05) {
      // Project velocity onto forward direction to preserve speed on ramps
      const fwdSpd3 = state.vel.dot(ttan);
      state.vel.set(ttan.x * fwdSpd3, ttan.y * fwdSpd3, ttan.z * fwdSpd3);
    }
  } else {
    state.vel.y -= 22 * dt;  // stronger gravity so car doesn't float
    state.onGround = false;
  }

  // Boost pads — gentle speed bump, not a cannon
  boostMeshes.forEach(bp => {
    if (Math.abs(bestT - bp.t) < 0.018 && minD < TRACK_W/2) {
      boost = 5;
      // Only boost if not already at/above max — adds ~20 km/h forward impulse
      const curFwdSpd = state.vel.dot(ttan);
      if (curFwdSpd < MAX_V * 1.3) {
        state.vel.addScaledVector(ttan, 4);
      }
      shakeAmt = 0.3;
    }
  });

  // Wrong-way
  const fv2 = new THREE.Vector3(Math.sin(state.rot), 0, Math.cos(state.rot));
  $('wrongway').style.display = (fv2.dot(ttan) < -0.7 && state.speed > 4) ? 'block' : 'none';

  state.pos.addScaledVector(state.vel, dt);
  state.speed = state.vel.length();
  if (state.speed > topSpeed) topSpeed = state.speed;
  state.gear = Math.max(1, Math.min(6, Math.ceil(state.speed / MAX_V * 6)));

  // Particles: tyre smoke on handbrake
  if ((HB || Math.abs(latSpd) > 7) && state.speed > 4) {
    shakeAmt = Math.max(shakeAmt, 0.2);
    CAR.wheels.forEach(w => {
      const wp = new THREE.Vector3();
      CAR.group.localToWorld(wp.copy(w.mesh.position));
      const v = new THREE.Vector3((Math.random()-0.5)*2, Math.random()*1.5, (Math.random()-0.5)*2);
      sparks.spawn(wp, v, 0.6, 0.6, 0.6, 0.5 + Math.random()*0.4);
    });
  }

  // Exhaust
  if (W && state.speed > 3) {
    const ep = state.pos.clone().addScaledVector(fwd, -2.2); ep.y += 0.3;
    const ec = state.nitro
      ? { r:1, g:0.5, b:0 }
      : { r:0.3, g:0.35, b:0.4 };
    const v = new THREE.Vector3((Math.random()-0.5)*0.8, 0.3+Math.random()*0.4, (Math.random()-0.5)*0.8);
    v.addScaledVector(fwd, -(state.speed * 0.3 + 1.5));
    sparks.spawn(ep, v, ec.r, ec.g, ec.b, 0.3 + Math.random()*0.3);
  }

  // Nitro flames
  if (state.nitro) {
    for (let i = 0; i < 5; i++) {
      const fp = state.pos.clone().addScaledVector(fwd, -2.5 + (Math.random()-0.5));
      fp.y += 0.3;
      const fv3 = new THREE.Vector3((Math.random()-0.5)*2, Math.random()*1.2, (Math.random()-0.5)*2);
      fv3.addScaledVector(fwd, -(9 + Math.random()*5));
      const hot = Math.random() > 0.5;
      sparks.spawn(fp, fv3, hot?1:1, hot?0.4:0.8, 0, 0.18 + Math.random()*0.25);
    }
    shakeAmt = Math.max(shakeAmt, 0.15);
  }
}

// ─────────────────────────────────────────────
//  CHECKPOINT LOGIC
// ─────────────────────────────────────────────
function checkCPs() {
  if (phase !== 'racing') return;
  const now = performance.now();
  cpData.forEach(cp => {
    if (state.pos.distanceTo(cp.p) > TRACK_W * 0.8 + 2) return;
    if (cp.idx === 0) {
      if (finishReady) {
        const lt = now - lapStart;
        lapStart = now;
        if (lt < bestLap) bestLap = lt;
        curLap++;
        cpHits.clear();
        finishReady = false;
        flash();
        if (curLap >= TOTAL_LAPS) { setTimeout(() => showFinish(lt), 400); return; }
        refreshDots();
      }
    } else {
      if (!cpHits.has(cp.idx)) {
        cpHits.add(cp.idx);
        flash();
        if (cpHits.size === CP_TS.length - 1) finishReady = true;
      }
    }
  });
}

function flash() {
  const el = $('cp-flash');
  el.className = '';
  void el.offsetWidth;
  el.className = 'show';
}

function showFinish(lt) {
  phase = 'finish';

}

// ─────────────────────────────────────────────
//  CAMERA – smooth chase, PolyTrack style
// ─────────────────────────────────────────────
const camOffset = new THREE.Vector3();
const camTarget = new THREE.Vector3();

function tickCamera() {
  const fwd = new THREE.Vector3(Math.sin(state.rot), 0, Math.cos(state.rot));
  const spd = Math.min(1, state.speed / MAX_V);
  const sx  = shakeAmt * (Math.random()-0.5) * 0.25;
  const sy  = shakeAmt * (Math.random()-0.5) * 0.12;
  shakeAmt *= 0.85;

  camOffset.set(
    state.pos.x - fwd.x * (11 + spd*3) + sx,
    state.pos.y + 4.5 + spd * 1.5 + sy,
    state.pos.z - fwd.z * (11 + spd*3)
  );
  cam.position.lerp(camOffset, 0.09);
  camTarget.set(state.pos.x, state.pos.y + 1.2, state.pos.z);
  cam.lookAt(camTarget);
}

// ─────────────────────────────────────────────
//  CAR MESH UPDATE
// ─────────────────────────────────────────────
function tickCarMesh() {
  CAR.group.position.copy(state.pos);
  CAR.group.rotation.y = state.rot;

  // Banking
  const roll = -state.angVel * state.speed * 0.015;
  CAR.group.rotation.z += (roll - CAR.group.rotation.z) * 0.13;

  // Wheel spin
  const ws = state.speed * 0.55 * (1/60);
  CAR.wheels.forEach(w => {
    w.mesh.children[0].rotation.x += ws;
    w.mesh.children[1].rotation.x += ws;
  });

  // Front wheel steer
  CAR.wheels[0].mesh.rotation.y = state.angVel * 0.45;
  CAR.wheels[1].mesh.rotation.y = state.angVel * 0.45;

  // Under-glow
  CAR.ugl.color.setHex(state.nitro ? 0xff8800 : 0xff3300);
  CAR.ugl.intensity = state.nitro ? 4 : 2;
}

// ─────────────────────────────────────────────
//  HUD UPDATE
// ─────────────────────────────────────────────
function tickHUD() {
  const kmh = Math.round(state.speed * 3.6);
  $('speed-num').textContent = kmh;
  $('gear-num').textContent  = state.gear;
  $('gear-num').className    = state.gear >= 5 ? 'red' : '';

  if (phase === 'racing') {
    const el = performance.now() - lapStart;
    $('lap-time').textContent  = fmt(el);
    $('best-time').textContent = bestLap < Infinity ? 'BEST: ' + fmt(bestLap) : 'BEST: --:--.---';
  }

  for (let i = 0; i < 5; i++) {
    const seg = $(`bs${i}`);
    const lit = i < Math.ceil(boost);
    seg.className = 'bseg' + (lit ? (i === 4 ? ' lit top' : ' lit') : '');
  }
}

// ─────────────────────────────────────────────
//  MINIMAP
// ─────────────────────────────────────────────
const mmCanvas = $('minimap-canvas');
const mmCtx    = mmCanvas.getContext('2d');
const MMW = 140, MMH = 140;

let mmMinX=Infinity, mmMaxX=-Infinity, mmMinZ=Infinity, mmMaxZ=-Infinity;
trackPts.forEach(p => {
  mmMinX=Math.min(mmMinX,p.x); mmMaxX=Math.max(mmMaxX,p.x);
  mmMinZ=Math.min(mmMinZ,p.z); mmMaxZ=Math.max(mmMaxZ,p.z);
});
const mmPad=12;
const mmSX=(MMW-mmPad*2)/(mmMaxX-mmMinX), mmSZ=(MMH-mmPad*2)/(mmMaxZ-mmMinZ);
const mmS=Math.min(mmSX,mmSZ);
const mmDX=(MMW-mmPad*2-(mmMaxX-mmMinX)*mmS)/2, mmDZ=(MMH-mmPad*2-(mmMaxZ-mmMinZ)*mmS)/2;
const mm2d = (x,z) => ({
  x: (x-mmMinX)*mmS+mmPad+mmDX,
  y: (z-mmMinZ)*mmS+mmPad+mmDZ
});

function tickMinimap() {
  mmCtx.clearRect(0,0,MMW,MMH);
  mmCtx.fillStyle='rgba(5,10,30,.85)';
  mmCtx.fillRect(0,0,MMW,MMH);

  // Track
  mmCtx.beginPath();
  trackPts.forEach((p,i) => {
    const m = mm2d(p.x,p.z);
    i===0 ? mmCtx.moveTo(m.x,m.y) : mmCtx.lineTo(m.x,m.y);
  });
  mmCtx.closePath();
  mmCtx.strokeStyle='rgba(255,255,255,.2)'; mmCtx.lineWidth=5; mmCtx.stroke();
  mmCtx.strokeStyle='#ffffff'; mmCtx.lineWidth=2; mmCtx.stroke();

  // Checkpoints
  CP_TS.forEach((t,i) => {
    const idx=Math.floor(t*(trackPts.length-1));
    const p=trackPts[idx], m=mm2d(p.x,p.z);
    mmCtx.beginPath(); mmCtx.arc(m.x,m.y,3.5,0,Math.PI*2);
    mmCtx.fillStyle=i===0?'#ffd700':'#00ffcc'; mmCtx.fill();
  });

  // Car dot
  const cm=mm2d(state.pos.x,state.pos.z);
  mmCtx.beginPath(); mmCtx.arc(cm.x,cm.y,5,0,Math.PI*2);
  mmCtx.fillStyle='#ff3300'; mmCtx.fill();
  mmCtx.beginPath(); mmCtx.arc(cm.x,cm.y,8,0,Math.PI*2);
  mmCtx.strokeStyle='rgba(255,80,0,.4)'; mmCtx.lineWidth=2; mmCtx.stroke();
}

// ─────────────────────────────────────────────
//  WORLD ANIMATION (boost pad pulse etc)
// ─────────────────────────────────────────────
function tickWorld(t) {
  // We'd animate boost materials here if we kept refs, skipping for simplicity
}

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
let prev = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;

  if (phase === 'racing' || phase === 'finish' || phase === 'countdown') {
    tickPhysics(dt);
    tickCarMesh();
    tickCamera();
    checkCPs();
    tickHUD();
    sparks.tick(dt);
    tickMinimap();
    tickWorld(now/1000);
  }

  renderer.render(scene, cam);
}
loop(performance.now());
</script>
